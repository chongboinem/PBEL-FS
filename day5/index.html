<!-- COMBINATORS (we use selectors) makes it easier to target any kind of element
-child combinator > (it will be applicable only on the child)
-descendent selector "space" (it takes all the generations so it overlaps the more you create stuff)
-adjacent sibling combinator + (will be applicable only to the next one)
-general sibling combinator ~ (will be applicable to all siblings)

the first 2 are for child and the last 2 are for sibling
-->
